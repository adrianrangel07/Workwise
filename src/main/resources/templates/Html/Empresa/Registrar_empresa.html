    <div class="container-logo">
        <a class="navbar-brand d-flex justify-content-center align-items-center sidebar-brand m-0" th:href="@{/}">
            <img class="logo" id="logo" src="../Imagenes/wknblack.png">
        </a>
    </div>
    <div class="contenedor">
        <div class="container-login">
            <div class="card">
                <div class="head-card">
                    <h1>Create a Company Account!</h1>
                    <div class="container-back">
                        <a th:href="@{/}" class="back_a">
                            <i class="fas fa-arrow-left back"></i>
                        </a>
                    </div>
                </div>
                <p>We give you solutions.</p>
                <div class="formulario">
                    <form id="registerForm" th:action="@{/Registrar/Empresa}" method="post" class="user">
                        <div class="row"> <!-- nombre y razon social -->
                            <div class="contenedor-input">
                                <div class="col-sm-6 mb-3">
                                    <input class="form-control form-control-user" type="text" id="nombreEmp" placeholder="" name="nombre" required>
                                    <label for="nombreEmp" class="label">Comany name</label>
                                </div>
                            </div>
                            <div class="contenedor-input">
                                <div class="col-sm-6 mb-3">
                                    <input class="form-control form-control-user" type="text"
                                        placeholder="" id="razon_social" name="razon_social" required>
                                        <label for="razon_social" class="label">Social Reason</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3"> <!-- email -->
                            <input class="form-control form-control-user" type="email"
                                aria-describedby="emailHelp" placeholder="" id="email" name="email" required>
                                <label for="email" class="label">Email</label>
                        </div>
                        <div class="row"> <!-- contraseñas -->
                            <div class="contenedor-input">
                                <div class="col-sm-6 mb-3">
                                    <input class="form-control form-control-user" type="password"
                                        placeholder="" id="password" name="password" minlength="6" maxlength="45" required>
                                        <label for="password" class="label">Password</label>
                                </div>
                            </div>
                            <div class="contenedor-input">
                                <div class="col-sm-6 mb-3">
                                    <input class="form-control form-control-user" type="password"
                                        placeholder="" id="confirm-password" name="confirm-password" minlength="6" maxlength="45"
                                        required>
                                        <label for="confirm-password" class="label">Repeat Password</label>
                                </div>
                            </div>
                        </div>
                        <div class="row"> <!-- Nit y direccion -->
                            <div class="contenedor-input">
                                <div class="col-sm-6 mb-3">
                                    <input class="form-control form-control-user" type="text" placeholder=""
                                        id="nit" name="nit" minlength="7" maxlength="9" required>
                                        <label for="nit" class="label">Nit</label>
                                </div>
                            </div>
                            <div class="contenedor-input">
                                <div class="col-sm-6 mb-3">
                                    <input class="form-control form-control-user" type="text" placeholder=""
                                        id="direccion" name="direccion" required>
                                        <label for="direccion" class="label">Address</label>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-primary d-block btn-user w-100" type="submit" id="btn-register">
                            Register
                        </button>
                    </form>
                </div>
            </div>
            <div class="login">
                <p>Already have a company account?<a th:href="@{/login/Empresa}">Login!</a></p>
            </div>
        </div>
        <div class="curva">
            <div class="container-img"></div>
        </div>
    </div>
